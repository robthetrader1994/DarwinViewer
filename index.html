<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0e1116">
<title>Darwin Stable</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --border:#262d38;
    --text:#e6edf3; --muted:#8b949e;
    --green:#3fb950; --red:#f85149; --accent:#2dd4bf;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--text);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; padding:14px; max-width:560px; margin:0 auto;
  }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  header h1 { font-size:17px; font-weight:600; }
  .btns { display:flex; gap:8px; }
  button.icon {
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    border-radius:8px; padding:8px 12px; cursor:pointer; font-size:15px;
  }
  button.icon:active { color:var(--text); border-color:var(--accent); }

  #folders { display:flex; flex-direction:column; gap:12px; }
  .folder-head {
    display:flex; align-items:center; gap:8px;
    padding:2px 2px 8px; border-bottom:1px solid var(--border); margin-bottom:8px;
  }
  .caret { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:13px; padding:6px; width:26px; }
  .folder-name {
    background:transparent; border:1px solid transparent; border-radius:6px;
    color:var(--text); font-weight:700; font-size:15px; padding:6px 6px; flex:1; min-width:0;
  }
  .folder-name:focus { outline:none; border-color:var(--accent); background:var(--bg); }
  .folder-count { color:var(--muted); font-size:12px; }
  .folder-add, .folder-del {
    background:transparent; border:none; color:var(--muted);
    cursor:pointer; font-size:18px; line-height:1; padding:6px 8px; border-radius:6px;
  }
  .folder-add:active { color:var(--accent); }
  .folder-del:active { color:var(--red); }
  .folder-del.armed { color:var(--red); font-size:12px; font-weight:600; }

  .folder-body { display:flex; flex-direction:column; gap:8px; }

  .row {
    display:grid; grid-template-columns:26px 54px 1fr auto 30px;
    align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:12px 12px;
  }
  .arrows { display:flex; flex-direction:column; gap:2px; }
  .arrow {
    background:transparent; border:none; color:var(--muted);
    font-size:12px; line-height:1; cursor:pointer; padding:4px; border-radius:4px;
  }
  .arrow:active:not(:disabled) { color:var(--accent); }
  .arrow:disabled { opacity:0.25; }
  .ticker { font-weight:700; font-size:15px; color:var(--accent); }
  .mid { display:flex; flex-direction:column; }
  .value { font-size:19px; font-weight:600; line-height:1.1; }
  .spread { font-size:11px; color:var(--muted); margin-top:2px; }
  .ret { font-size:18px; font-weight:700; text-align:right; }
  .ret.up { color:var(--green); }
  .ret.down { color:var(--red); }
  .ret-lbl { font-size:10px; color:var(--muted); text-align:right; text-transform:uppercase; letter-spacing:0.5px; }
  .del {
    background:transparent; border:none; color:var(--muted);
    font-size:19px; cursor:pointer; line-height:1; padding:4px; border-radius:6px;
  }
  .del:active { color:var(--red); }
  .row.err .value { color:var(--red); font-size:15px; }

  .add-inline { display:none; gap:8px; margin-top:2px; }
  .add-inline.show { display:flex; }
  .add-inline input {
    flex:1; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:monospace; font-size:14px; padding:10px;
  }
  .add-inline button {
    background:var(--accent); border:none; color:#04211d;
    font-weight:600; padding:0 16px; border-radius:8px; cursor:pointer; font-size:14px;
  }

  .newfolder { margin-top:12px; }
  .newfolder-btn {
    width:100%; background:transparent; border:1px dashed var(--border);
    color:var(--muted); border-radius:8px; padding:10px; cursor:pointer; font-size:14px;
  }
  .newfolder-btn:active { color:var(--text); border-color:var(--accent); }
  .newfolder-inline { display:none; gap:8px; margin-top:8px; }
  .newfolder-inline.show { display:flex; }
  .newfolder-inline input {
    flex:1; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:14px; padding:10px;
  }
  .newfolder-inline button {
    background:var(--accent); border:none; color:#04211d;
    font-weight:600; padding:0 16px; border-radius:8px; cursor:pointer; font-size:14px;
  }

  footer { margin-top:14px; font-size:12px; color:var(--muted); text-align:center; }

  #settings { display:none; margin-top:8px; }
  #settings.open { display:block; }
  #settings p { color:var(--muted); font-size:12px; margin-bottom:8px; }
  #settings label { display:block; color:var(--muted); font-size:12px; margin:10px 0 4px; }
  textarea, .proxy-input {
    width:100%; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:monospace; font-size:13px; padding:10px;
  }
  textarea { height:170px; resize:vertical; }
  #save {
    margin-top:10px; width:100%; background:var(--accent); border:none; color:#04211d;
    font-weight:600; padding:12px; border-radius:8px; cursor:pointer; font-size:15px;
  }

  .banner {
    background:rgba(248,81,73,0.1); border:1px solid var(--red);
    color:var(--text); border-radius:8px; padding:10px; font-size:12px; margin-bottom:12px; display:none;
  }
  .banner.show { display:block; }
  .banner b { color:var(--red); }
</style>
</head>
<body>

  <header>
    <h1>Darwin Stable</h1>
    <div class="btns">
      <button class="icon" id="refresh" title="Refresh">&#8635;</button>
      <button class="icon" id="gear" title="Settings">&#9881;</button>
    </div>
  </header>

  <div class="banner" id="banner"></div>

  <div id="folders"></div>

  <div class="newfolder">
    <button class="newfolder-btn" id="newFolderBtn">+ New folder</button>
    <div class="newfolder-inline" id="newFolderInline">
      <input type="text" id="newFolderName" placeholder="Folder name" spellcheck="false">
      <button id="newFolderAdd">Add</button>
    </div>
  </div>

  <div id="settings">
    <label>Darwin list (lines starting with # are folders)</label>
    <textarea id="names" spellcheck="false"></textarea>

    <label>CORS proxy (optional — only if quotes won't load)</label>
    <input class="proxy-input" id="proxy" placeholder="https://your-proxy/?url=" spellcheck="false">

    <button id="save">Save</button>
  </div>

  <footer id="footer">&#8212;</footer>

<script>
// ============================================================
//  Darwin Stable — standalone mobile page
//  Storage: localStorage (this is a normal web page, not an extension)
// ============================================================

const REFRESH_SECONDS = 60;
const API_BASE = "https://www.darwinexzero.com/api/productquotes/quotes/name?productName=";
const INCEPTION_BASE = 100;
const SHOW_RETURN = true;

// Default CORS proxy — the darwinexzero API cannot be read directly from a
// web page (CORS), so requests are routed through this relay. Overridable in settings.
const DEFAULT_PROXY = "https://darwinproxy.robthetrader1994.workers.dev/?url=";

// Seeded on first run (your actual stable + watchlist)
const DEFAULT_FOLDERS = [
  { name:"My Stable", collapsed:false, items:["ILWF.5.14","NAIL.5.12","QEOU.5.1","TFYG.5.11","SFKU.5.13"] },
  { name:"Watchlist", collapsed:false, items:["IME.5.2","XAQP.5.16","QWMK.5.11","HYDA.5.15","LSGT.5.24"] }
];

const foldersEl  = document.getElementById("folders");
const footerEl   = document.getElementById("footer");
const namesEl    = document.getElementById("names");
const proxyEl    = document.getElementById("proxy");
const settingsEl = document.getElementById("settings");
const bannerEl   = document.getElementById("banner");

let lastQuotes = {};

// ---------- storage (synchronous localStorage) ----------
function loadFolders() {
  try {
    const raw = localStorage.getItem("dsv_folders");
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  const seed = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
  saveFolders(seed);
  return seed;
}
function saveFolders(f) { localStorage.setItem("dsv_folders", JSON.stringify(f)); }
function getProxy() { const p = localStorage.getItem("dsv_proxy"); return (p === null ? DEFAULT_PROXY : p); }
function setProxy(p) { localStorage.setItem("dsv_proxy", p || ""); }

// ---------- folder mutations ----------
function addFolder(name) {
  const f = loadFolders();
  f.push({ name:(name||"New folder").trim()||"New folder", collapsed:false, items:[] });
  saveFolders(f); render();
}
function renameFolder(i, name) { const f=loadFolders(); if(f[i]){ f[i].name=name.trim()||f[i].name; saveFolders(f);} }
function deleteFolder(i) { const f=loadFolders(); f.splice(i,1); saveFolders(f); render(); }
function toggleCollapse(i) { const f=loadFolders(); if(f[i]){ f[i].collapsed=!f[i].collapsed; saveFolders(f); render(); } }
function addDarwin(i, name) { name=(name||"").trim(); if(!name)return; const f=loadFolders(); f[i].items.push(name); saveFolders(f); refresh(); }
function deleteDarwin(i,j) { const f=loadFolders(); f[i].items.splice(j,1); saveFolders(f); render(); }
function moveDarwin(i,j,dir) { const f=loadFolders(); const it=f[i].items; const k=j+dir; if(k<0||k>=it.length)return; [it[j],it[k]]=[it[k],it[j]]; saveFolders(f); render(); }

// ---------- fetch ----------
async function fetchQuote(name) {
  const proxy = getProxy();
  const apiUrl = API_BASE + encodeURIComponent(name);
  const url = proxy ? proxy + encodeURIComponent(apiUrl) : apiUrl;
  const res = await fetch(url);              // no credentials — public quote
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  return Array.isArray(data) ? data[0] : data;
}

// ---------- helpers ----------
function tickerOf(n){ return n.split(".")[0]; }
function derivedReturn(v){ return v - INCEPTION_BASE; }
function el(tag, cls, text){ const e=document.createElement(tag); if(cls)e.className=cls; if(text!==undefined)e.textContent=text; return e; }

// ---------- render ----------
function render() {
  const folders = loadFolders();
  foldersEl.innerHTML = "";

  folders.forEach((folder, fi) => {
    const box = el("div", "folder");
    const head = el("div", "folder-head");

    const caret = el("button","caret", folder.collapsed ? "\u25B8" : "\u25BE");
    caret.addEventListener("click", () => toggleCollapse(fi));

    const nameInput = document.createElement("input");
    nameInput.className = "folder-name";
    nameInput.value = folder.name;
    nameInput.spellcheck = false;
    nameInput.addEventListener("change", () => renameFolder(fi, nameInput.value));
    nameInput.addEventListener("keydown", (e) => { if(e.key==="Enter") nameInput.blur(); });

    const count = el("span","folder-count", folder.items.length+"");
    const addBtn = el("button","folder-add","+");
    const delBtn = el("button","folder-del","\u00D7");
    delBtn.addEventListener("click", () => {
      if (delBtn.dataset.armed) { deleteFolder(fi); return; }
      delBtn.dataset.armed="1"; delBtn.textContent="delete?"; delBtn.classList.add("armed");
      setTimeout(()=>{ delBtn.dataset.armed=""; delBtn.textContent="\u00D7"; delBtn.classList.remove("armed"); },2500);
    });

    head.appendChild(caret); head.appendChild(nameInput);
    head.appendChild(count); head.appendChild(addBtn); head.appendChild(delBtn);
    box.appendChild(head);

    if (!folder.collapsed) {
      const body = el("div","folder-body");
      folder.items.forEach((name,j)=> body.appendChild(renderRow(fi,j,name,folder.items.length)));

      const addInline = el("div","add-inline");
      const inp = document.createElement("input");
      inp.type="text"; inp.placeholder="e.g. IME.5.2"; inp.spellcheck=false;
      const go = el("button","","Add");
      const doAdd = ()=> addDarwin(fi, inp.value);
      go.addEventListener("click", doAdd);
      inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter") doAdd(); });
      addInline.appendChild(inp); addInline.appendChild(go);
      body.appendChild(addInline);
      addBtn.addEventListener("click", ()=>{ addInline.classList.toggle("show"); if(addInline.classList.contains("show")) inp.focus(); });

      box.appendChild(body);
    }
    foldersEl.appendChild(box);
  });
}

function renderRow(fi,j,name,total) {
  const cached = lastQuotes[name];
  const error = cached && cached.error;
  const quote = cached && cached.quote;
  const row = el("div","row"+(error?" err":""));

  const arrows = el("div","arrows");
  const up = el("button","arrow","\u25B2"); up.disabled=j===0;
  up.addEventListener("click",()=>moveDarwin(fi,j,-1));
  const down = el("button","arrow","\u25BC"); down.disabled=j===total-1;
  down.addEventListener("click",()=>moveDarwin(fi,j,+1));
  arrows.appendChild(up); arrows.appendChild(down);

  const ticker = el("div","ticker",tickerOf(name));
  const mid = el("div","mid");
  const rightWrap = el("div","");

  if (error) {
    mid.appendChild(el("div","value","error"));
    mid.appendChild(el("div","spread",cached.error));
  } else if (!quote) {
    mid.appendChild(el("div","value","\u2026"));
    mid.appendChild(el("div","spread",""));
  } else if (quote.value===null) {
    mid.appendChild(el("div","value","\u2013"));
    mid.appendChild(el("div","spread","no quote"));
  } else {
    const val=parseFloat(quote.value), spr=parseFloat(quote.spread);
    mid.appendChild(el("div","value",val.toFixed(2)));
    mid.appendChild(el("div","spread","spread "+spr.toFixed(4)));
    if (SHOW_RETURN) {
      const ret=derivedReturn(val);
      rightWrap.appendChild(el("div","ret-lbl","since inception"));
      rightWrap.appendChild(el("div","ret "+(ret>=0?"up":"down"),(ret>=0?"+":"")+ret.toFixed(2)+"%"));
    }
  }

  const del = el("button","del","\u00D7");
  del.addEventListener("click",()=>deleteDarwin(fi,j));

  row.appendChild(arrows); row.appendChild(ticker);
  row.appendChild(mid); row.appendChild(rightWrap); row.appendChild(del);
  return row;
}

// ---------- refresh ----------
async function refresh() {
  const folders = loadFolders();
  const names = [...new Set(folders.flatMap(f=>f.items))];
  bannerEl.classList.remove("show");
  footerEl.textContent = "loading\u2026";
  render();

  // Fetch ONE AT A TIME so the free proxy relay doesn't choke.
  // Each row updates as its quote arrives; one retry on failure.
  lastQuotes = {};
  let anyFail = false;

  for (let i = 0; i < names.length; i++) {
    const name = names[i];
    try {
      lastQuotes[name] = { quote: await fetchQuote(name) };
    } catch (e1) {
      // one quick retry — the relay often fails intermittently under load
      await sleep(400);
      try {
        lastQuotes[name] = { quote: await fetchQuote(name) };
      } catch (e2) {
        lastQuotes[name] = { error: e2.message || "failed" };
        anyFail = true;
      }
    }
    render();                       // show this row's result immediately
    await sleep(150);               // small gap between requests
  }

  footerEl.textContent = "updated " + new Date().toLocaleTimeString();

  if (anyFail) {
    bannerEl.innerHTML = "<b>Some quotes didn't load.</b> The free relay was busy \u2014 " +
      "hit \u21BB refresh to retry the missing ones.";
    bannerEl.classList.add("show");
  }
}

// small delay helper
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ---------- settings ----------
function openSettings() {
  const folders = loadFolders();
  const lines = [];
  folders.forEach(f=>{ lines.push("# "+f.name); f.items.forEach(it=>lines.push(it)); });
  namesEl.value = lines.join("\n");
  proxyEl.value = getProxy();
  settingsEl.classList.toggle("open");
}
function handleSave() {
  const prev = loadFolders();
  const collapsedByName = {};
  prev.forEach(f=>{ collapsedByName[f.name]=f.collapsed; });

  const folders = []; let cur=null;
  namesEl.value.split("\n").forEach(raw=>{
    const line=raw.trim(); if(!line)return;
    if (line.startsWith("#")) {
      const nm=line.slice(1).trim()||"Folder";
      cur={name:nm,collapsed:collapsedByName[nm]||false,items:[]}; folders.push(cur);
    } else {
      if(!cur){ cur={name:"My Stable",collapsed:false,items:[]}; folders.push(cur); }
      cur.items.push(line);
    }
  });
  if (!folders.length) folders.push({name:"My Stable",collapsed:false,items:[]});

  saveFolders(folders);
  setProxy(proxyEl.value.trim());
  settingsEl.classList.remove("open");
  refresh();
}

// ---------- wire-up ----------
document.getElementById("refresh").addEventListener("click", refresh);
document.getElementById("gear").addEventListener("click", openSettings);
document.getElementById("save").addEventListener("click", handleSave);

const nfInline=document.getElementById("newFolderInline");
const nfName=document.getElementById("newFolderName");
document.getElementById("newFolderBtn").addEventListener("click", ()=>{
  nfInline.classList.toggle("show"); if(nfInline.classList.contains("show")) nfName.focus();
});
const doAddFolder=()=>{ addFolder(nfName.value); nfName.value=""; nfInline.classList.remove("show"); };
document.getElementById("newFolderAdd").addEventListener("click", doAddFolder);
nfName.addEventListener("keydown",(e)=>{ if(e.key==="Enter") doAddFolder(); });

refresh();
setInterval(refresh, REFRESH_SECONDS*1000);
</script>
</body>
</html>
